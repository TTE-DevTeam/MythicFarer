name: MythicFarer
version: '1.0.0'
main: de.dertoaster.mythicfarer.MythicFarer
loader: de.dertoaster.mythicfarer.MythicFarerClassLoader
api-version: '1.21'
dependencies:
  #bootstrap:
  # Let's say that RegistryPlugin registers some data that your plugin needs to use
  # We don't need this during runtime, so it's not required in the server section.
  # However, can be added to both if needed
  #RegistryPlugin:
  #load: BEFORE
  #required: true
  #join-classpath: true # Defaults to true
  server:
    # Add a required "RequiredPlugin" dependency, which will load BEFORE your plugin.
    Windfarer:
      load: BEFORE
      required: true
      # False means that your plugin will not have access to their classpath
      join-classpath: true
    MythicMobs:
      load: BEFORE
      required: true
      join-classpath: true
    Movecraft-TTE-Additions:
      load: BEFORE
      required: false
      join-classpath: true